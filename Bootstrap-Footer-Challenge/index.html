    <main class="container flex-grow-1">
        <h2>Mostly Empty Body ....</h2>

<div class="container">
    <h2 class="mb-1">
        The footer begins here with this thin horizontal line below with red color
    </h2>
</div>

<footer class="mt-auto py-4 px-4 border-top border-4 bg-warning border-danger">
        <div class="container-fluid">
            <div class="row align-items-center text-center">

                <div class="col-md-4 d-flex align-items-center justify-content-start">
                    <a href="https://example.com" class="me-2 text-dark text-decoration-none lh-1">
                        <svg class="bi" width="30" height="24">
                            <use href="#heart"></use>
                        </svg>
                    </a>
                    <span class="text-dark">&copy; 2022 Company, Inc</span>
                </div>

                <div class="col-md-4">
                    <span class="text-dark">201 Dundas Street East, London Ontario N5R 1F3 Canada</span>
                </div>

                <div class="col-md-4 d-flex justify-content-end">
                    <ul class="nav list-unstyled d-flex mb-0">
                        <li class="ms-3">
                            <a class="text-dark" href="https://example.com/twitter">
                                <svg class="bi" width="24" height="24">
                                    <use href="#twitter"></use>
                                </svg>
                            </a>
                        </li>

                        <li class="ms-3">
                            <a class="text-dark" href="https://example.com/instagram">
                                <svg class="bi" width="24" height="24">
                                    <use href="#instagram"></use>
                                </svg>
                            </a>
                        </li>

                        <li class="ms-3">
                            <a class="text-dark" href="https://example.com/facebook">
                                <svg class="bi" width="24" height="24">
                                    <use href="#facebook"></use>
                                </svg>
                            </a>
                        </li>
                    </ul>
                </div>

            </div>
        </div>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
